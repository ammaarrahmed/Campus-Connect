name: campus_connect
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  
  # Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  
  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0
  
  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^11.0.0
  
  # Utilities
  uuid: ^4.5.3
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
