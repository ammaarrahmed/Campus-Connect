name: campus_connect
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Firebase
  firebase_core: ^3.4.0
  cloud_firestore: ^5.3.0
  firebase_auth: ^5.2.0
  google_sign_in: ^6.2.1
  
  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0
  
