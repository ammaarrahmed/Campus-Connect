  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
